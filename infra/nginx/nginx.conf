user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  1000;
    server_tokens       off;

    gzip  on;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_comp_level     6;
    gzip_types          text/plain text/css text/xml application/json
                        application/javascript application/xml+rss
                        application/atom+xml image/svg+xml;

    # Docker internal DNS resolver for dynamic upstream resolution
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    # Upstream definitions
    upstream gateway_upstream {
        least_conn;
        server gateway:8080;
        keepalive 32;
    }

    upstream bff_upstream {
        least_conn;
        server bff:4000;
        keepalive 16;
    }

    upstream studio_upstream {
        server studio:80;
        keepalive 8;
    }

    upstream portal_upstream {
        server portal:3001;
        keepalive 8;
    }

    upstream grafana_upstream {
        server grafana:3000;
        keepalive 4;
    }

    upstream kibana_upstream {
        server kibana:5601;
        keepalive 4;
    }

    upstream jaeger_upstream {
        server jaeger:16686;
        keepalive 4;
    }

    # ─── nginx_status（僅供 Prometheus exporter 內部存取）────
    server {
        listen 8888;
        server_name _;
        location /nginx_status {
            stub_status on;
            access_log  off;
            allow 172.28.0.0/16;
            deny  all;
        }
        location / { return 404; }
    }

    include /etc/nginx/conf.d/*.conf;
}
