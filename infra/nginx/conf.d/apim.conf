# ═══════════════════════════════════════════════════════════════
#  xCloudAPIM — Nginx Virtual Hosts（HTTP :80）
#  對外服務（api/bff/studio/portal）一律 301 轉址至 HTTPS（見 ssl.conf）。
#  維運 UI（grafana/kibana/jaeger）維持內網 HTTP + Basic Auth。
# ═══════════════════════════════════════════════════════════════

# ─── Common ───────────────────────────────────────────────────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ─── Rate limiting zones ──────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=100r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m   rate=10r/s;
limit_req_zone $binary_remote_addr zone=portal_limit:10m rate=30r/s;

# ─── HTTP → HTTPS 強制轉址（對外服務 + 預設）──────────────────
server {
    listen 80 default_server;
    server_name api.apim.local bff.apim.local studio.apim.local portal.apim.local localhost _;
    return 301 https://$host$request_uri;
}

# ─── Grafana  grafana.apim.local（維運，內網 HTTP + Basic Auth）─
server {
    listen 80;
    server_name grafana.apim.local;
    location / {
        proxy_pass         http://grafana_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        auth_basic           "xCloudAPIM Ops";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;
    }
}

# ─── Kibana  kibana.apim.local（維運）────────────────────────
server {
    listen 80;
    server_name kibana.apim.local;
    location / {
        proxy_pass         http://kibana_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_set_header   kbn-xsrf         "nginx";
        auth_basic           "xCloudAPIM Ops";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;
    }
}

# ─── Jaeger  jaeger.apim.local（維運）────────────────────────
server {
    listen 80;
    server_name jaeger.apim.local;
    location / {
        proxy_pass         http://jaeger_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        auth_basic           "xCloudAPIM Ops";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;
    }
}
