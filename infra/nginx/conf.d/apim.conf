# ═══════════════════════════════════════════════════════════════
#  xCloudAPIM — Nginx Virtual Hosts
# ═══════════════════════════════════════════════════════════════

# ─── Common proxy headers snippet ────────────────────────────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ─── Rate limiting zones ──────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=100r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m   rate=10r/s;
limit_req_zone $binary_remote_addr zone=portal_limit:10m rate=30r/s;

# ─── Default: redirect bare IP to portal ─────────────────────
server {
    listen 80 default_server;
    return 301 http://portal.apim.local$request_uri;
}

# ─── API Gateway  api.apim.local / localhost:80/api ───────────
server {
    listen 80;
    server_name api.apim.local;

    client_max_body_size  16m;
    proxy_read_timeout    60s;
    proxy_connect_timeout 10s;

    location / {
        limit_req zone=api_limit burst=200 nodelay;

        proxy_pass         http://gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # CORS pre-flight passthrough
        proxy_hide_header  Access-Control-Allow-Origin;
    }

    location /healthz {
        proxy_pass http://gateway_upstream/healthz;
        access_log off;
    }
}

# ─── BFF GraphQL  bff.apim.local ─────────────────────────────
server {
    listen 80;
    server_name bff.apim.local;

    location /graphql {
        proxy_pass         http://bff_upstream/graphql;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;

        # GraphQL subscriptions (WS)
        proxy_read_timeout 3600s;
    }

    location /healthz {
        proxy_pass http://bff_upstream/healthz;
        access_log off;
    }
}

# ─── Policy Studio  studio.apim.local ────────────────────────
server {
    listen 80;
    server_name studio.apim.local;

    location / {
        proxy_pass         http://studio_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # Proxy /graphql to BFF (studio calls bff via nginx)
    location /graphql {
        proxy_pass         http://bff_upstream/graphql;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 3600s;
    }
}

# ─── Developer Portal  portal.apim.local ─────────────────────
server {
    listen 80;
    server_name portal.apim.local;

    client_max_body_size 8m;

    location / {
        limit_req zone=portal_limit burst=60 nodelay;

        proxy_pass         http://portal_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
    }
}

