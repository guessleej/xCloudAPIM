# ═══════════════════════════════════════════════════════════════
#  ssl.conf — 對外 HTTPS（TLS 1.2/1.3 + HSTS）
#  upstream gateway/bff 走 mTLS :9443（見 nginx.conf proxy_ssl_*）。
#  憑證：/etc/nginx/certs/apim.{crt,key}（gen-certs.sh；生產換正式 CA）。
# ═══════════════════════════════════════════════════════════════

# 共用 TLS 參數（每個 server 以 ssl_* 指令套用）
ssl_protocols       TLSv1.2 TLSv1.3;
ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers on;
ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 10m;

# ─── 預設 443（→ portal）────────────────────────────────────
server {
    listen 443 ssl default_server;
    http2  on;
    server_name _ localhost portal.apim.local;

    ssl_certificate     /etc/nginx/certs/apim.crt;
    ssl_certificate_key /etc/nginx/certs/apim.key;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    client_max_body_size 8m;

    location / {
        limit_req zone=portal_limit burst=60 nodelay;
        proxy_pass         http://portal_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $http_host;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Connection        "";
        proxy_redirect     ~^https?://[^/]+(/.*)$ https://$http_host$1;
        proxy_read_timeout 30s;
    }
}

# ─── API Gateway HTTPS（api.apim.local，upstream mTLS）────────
server {
    listen 443 ssl;
    http2  on;
    server_name api.apim.local;

    ssl_certificate     /etc/nginx/certs/apim.crt;
    ssl_certificate_key /etc/nginx/certs/apim.key;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;

    client_max_body_size  16m;
    proxy_read_timeout    60s;
    proxy_connect_timeout 10s;

    location / {
        limit_req zone=api_limit burst=200 nodelay;
        proxy_pass         https://gateway_upstream;
        proxy_ssl_name     gateway;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Connection        "";
        proxy_hide_header  Access-Control-Allow-Origin;
    }

    location /healthz {
        proxy_pass     https://gateway_upstream/healthz;
        proxy_ssl_name gateway;
        access_log off;
    }
}

# ─── BFF GraphQL HTTPS（bff.apim.local，upstream mTLS）────────
server {
    listen 443 ssl;
    http2  on;
    server_name bff.apim.local;

    ssl_certificate     /etc/nginx/certs/apim.crt;
    ssl_certificate_key /etc/nginx/certs/apim.key;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /graphql {
        proxy_pass         https://bff_upstream/graphql;
        proxy_ssl_name     bff;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    location /healthz {
        proxy_pass     https://bff_upstream/healthz;
        proxy_ssl_name bff;
        access_log off;
    }
}

# ─── Policy Studio HTTPS（studio.apim.local）─────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name studio.apim.local;

    ssl_certificate     /etc/nginx/certs/apim.crt;
    ssl_certificate_key /etc/nginx/certs/apim.key;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass         http://studio_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Connection        "";
    }

    location /graphql {
        proxy_pass         https://bff_upstream/graphql;
        proxy_ssl_name     bff;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 3600s;
    }
}
