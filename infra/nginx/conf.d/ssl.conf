# ═══════════════════════════════════════════════════════════════
#  ssl.conf — HTTPS / TLS 設定（開發環境 mkcert 憑證）
#  前置條件：bash scripts/gen-certs.sh
# ═══════════════════════════════════════════════════════════════

# ─── HTTP → HTTPS 強制跳轉（API / BFF / Studio）──────────────
server {
    listen 80;
    server_name api.apim.local bff.apim.local studio.apim.local;
    return 301 https://$host$request_uri;
}

# ─── API Gateway HTTPS ────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name api.apim.local;

    ssl_certificate     /etc/nginx/certs/apim.crt;
    ssl_certificate_key /etc/nginx/certs/apim.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    client_max_body_size  16m;
    proxy_read_timeout    60s;
    proxy_connect_timeout 10s;

    location / {
        limit_req zone=api_limit burst=200 nodelay;

        proxy_pass         http://gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Connection        "";
        proxy_hide_header  Access-Control-Allow-Origin;
    }

    location /healthz {
        proxy_pass http://gateway_upstream/healthz;
        access_log off;
    }
}

# ─── BFF GraphQL HTTPS ───────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name bff.apim.local;

    ssl_certificate     /etc/nginx/certs/apim.crt;
    ssl_certificate_key /etc/nginx/certs/apim.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /graphql {
        proxy_pass         http://bff_upstream/graphql;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    location /healthz {
        proxy_pass http://bff_upstream/healthz;
        access_log off;
    }
}

