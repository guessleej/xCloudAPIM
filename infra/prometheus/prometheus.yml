global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s
  external_labels:
    cluster: xcloudapim
    env:     development

rule_files:
  - "rules/gateway.yml"
  - "rules/services.yml"
  - "rules/sla.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ['gateway:8080']

  - job_name: auth-service
    metrics_path: /metrics
    static_configs:
      - targets: ['auth-service:8081']

  - job_name: registry-service
    metrics_path: /metrics
    static_configs:
      - targets: ['registry-service:8082']

  - job_name: subscription-service
    metrics_path: /metrics
    static_configs:
      - targets: ['subscription-service:8084']

  - job_name: analytics-service
    metrics_path: /metrics
    static_configs:
      - targets: ['analytics-service:8085']

  - job_name: notification-service
    metrics_path: /metrics
    static_configs:
      - targets: ['notification-service:8086']

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: kafka
    static_configs:
      - targets: ['kafka-exporter:9308']

  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: nginx
    static_configs:
      - targets: ['nginx-exporter:9113']
