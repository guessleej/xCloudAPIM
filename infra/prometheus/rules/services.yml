groups:
  - name: services.alerts
    interval: 30s
    rules:

      # ── Service Availability ─────────────────────────────────
      - alert: ServiceDown
        expr: up{job=~"auth-service|registry-service|policy-engine|subscription-service|analytics-service|notification-service|bff"} == 0
        for: 2m
        labels:
          severity: critical
          team:     platform
        annotations:
          summary:     "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} ({{ $labels.instance }}) unreachable for > 2 minutes."

      - alert: ServiceHighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5..",job=~"auth-service|registry-service|subscription-service"}[5m])) by (job)
          /
          sum(rate(http_requests_total{job=~"auth-service|registry-service|subscription-service"}[5m])) by (job)
          > 0.05
        for: 3m
        labels:
          severity: warning
          team:     platform
        annotations:
          summary:     "{{ $labels.job }} error rate > 5%"
          description: "Error rate for {{ $labels.job }} is {{ $value | humanizePercentage }}."

      # ── Auth Service ─────────────────────────────────────────
      - alert: AuthHighLoginFailureRate
        expr: |
          sum(rate(auth_login_failures_total[5m]))
          /
          (sum(rate(auth_login_attempts_total[5m])) + 0.001) > 0.30
        for: 5m
        labels:
          severity: warning
          team:     security
        annotations:
          summary:     "High authentication failure rate > 30%"
          description: "{{ $value | humanizePercentage }} of login attempts are failing. Possible credential stuffing."

      - alert: AuthJWTSigningErrors
        expr: sum(rate(auth_jwt_signing_errors_total[5m])) > 0
        for: 1m
        labels:
          severity: critical
          team:     security
        annotations:
          summary:     "JWT signing errors detected"
          description: "Auth service is failing to sign JWTs. Check Vault connectivity."

      # ── Policy Engine ────────────────────────────────────────
      - alert: PolicyEngineHighEvalLatency
        expr: |
          histogram_quantile(0.99,
            sum(rate(policy_evaluation_duration_seconds_bucket[5m])) by (le)
          ) > 0.1
        for: 3m
        labels:
          severity: warning
          team:     platform
        annotations:
          summary:     "Policy evaluation P99 > 100ms"
          description: "Policy engine P99 eval time is {{ $value | humanizeDuration }}. Check cache hit rate."

      - alert: PolicyCacheLowHitRate
        expr: |
          sum(rate(policy_cache_hits_total[5m]))
          /
          (sum(rate(policy_cache_hits_total[5m])) + sum(rate(policy_cache_misses_total[5m])) + 0.001)
          < 0.70
        for: 10m
        labels:
          severity: warning
          team:     platform
        annotations:
          summary:     "Policy cache hit rate < 70%"
          description: "Cache hit rate is {{ $value | humanizePercentage }}. Policy engine may be overloaded."

      # ── Infrastructure ───────────────────────────────────────
      - alert: PostgresHighConnections
        expr: |
          pg_stat_activity_count{datname="apim"}
          / pg_settings_max_connections > 0.80
        for: 5m
        labels:
          severity: warning
          team:     dba
        annotations:
          summary:     "PostgreSQL connection usage > 80%"
          description: "Using {{ $value | humanizePercentage }} of max connections."

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
          team:     platform
        annotations:
          summary:     "Redis memory usage > 85%"
          description: "Redis {{ $labels.instance }} at {{ $value | humanizePercentage }} memory."

      - alert: KafkaConsumerLag
        expr: kafka_consumer_group_lag > 10000
        for: 10m
        labels:
          severity: warning
          team:     platform
        annotations:
          summary:     "Kafka consumer lag > 10,000"
          description: "Topic {{ $labels.topic }} consumer group {{ $labels.group }} lag: {{ $value }}."

      # ── Node Resources ───────────────────────────────────────
      - alert: HighCPUUsage
        expr: |
          100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
          team:     ops
        annotations:
          summary:     "CPU usage > 85% on {{ $labels.instance }}"
          description: "{{ $value | humanize }}% CPU usage for 10+ minutes."

      - alert: HighMemoryUsage
        expr: |
          (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes)
          / node_memory_MemTotal_bytes > 0.90
        for: 10m
        labels:
          severity: critical
          team:     ops
        annotations:
          summary:     "Memory usage > 90% on {{ $labels.instance }}"
          description: "{{ $value | humanizePercentage }} memory used."

      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"}
          / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"}) < 0.15
        for: 5m
        labels:
          severity: critical
          team:     ops
        annotations:
          summary:     "Disk space < 15% on {{ $labels.instance }}"
          description: "Only {{ $value | humanizePercentage }} disk available."
