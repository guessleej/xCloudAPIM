name: Reusable — Go CI

on:
  workflow_call:
    inputs:
      service:
        required: true
        type:     string
        description: "服務名稱（e.g. auth-service）"
      working-directory:
        required: true
        type:     string
        description: "相對 repo root 的路徑（e.g. manager/services/auth）"
      go-version:
        required: false
        type:     string
        default:  "1.22"
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  go-ci:
    name: ${{ inputs.service }}
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ inputs.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version:   ${{ inputs.go-version }}
          cache:        true
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: Download modules
        run: go mod download
        env:
          GOTOOLCHAIN: auto

      - name: Verify modules
        run: go mod verify
        env:
          GOTOOLCHAIN: auto

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version:           v1.61.0
          working-directory: ${{ inputs.working-directory }}
          args:              --timeout=5m

      - name: go vet
        run: go vet ./...
        env:
          GOTOOLCHAIN: auto

      - name: Run tests
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./...
        env:
          GOTOOLCHAIN: auto

      - name: Upload coverage
        if:   success()
        uses: codecov/codecov-action@v4
        with:
          token:   ${{ secrets.CODECOV_TOKEN }}
          files:   ${{ inputs.working-directory }}/coverage.out
          flags:   ${{ inputs.service }}
          fail_ci_if_error: false

      - name: Build binary (sanity check)
        run: go build -o /dev/null ./cmd/...
        env:
          GOTOOLCHAIN: auto
