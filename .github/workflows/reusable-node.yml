name: Reusable — Node.js CI

on:
  workflow_call:
    inputs:
      service:
        required: true
        type:     string
      working-directory:
        required: true
        type:     string
      node-version:
        required: false
        type:     string
        default:  "20"
      run-build:
        required: false
        type:     boolean
        default:  true
      run-test:
        required: false
        type:     boolean
        default:  false
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  node-ci:
    name: ${{ inputs.service }}
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@v4

      - name: Check for package-lock.json
        id: lockfile
        run: |
          if [ -f "${{ inputs.working-directory }}/package-lock.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js ${{ inputs.node-version }} (with cache)
        if: steps.lockfile.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version:   ${{ inputs.node-version }}
          cache:          npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Set up Node.js ${{ inputs.node-version }} (no cache)
        if: steps.lockfile.outputs.exists != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --prefer-offline
          else
            npm install --ignore-scripts
          fi

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npm run typecheck --if-present

      - name: Build
        if:   ${{ inputs.run-build }}
        run:  npm run build

      - name: Test
        if:   ${{ inputs.run-test }}
        run:  npm test

      - name: Upload coverage
        if:   ${{ inputs.run-test && success() }}
        uses: codecov/codecov-action@v4
        with:
          token:   ${{ secrets.CODECOV_TOKEN }}
          flags:   ${{ inputs.service }}
          fail_ci_if_error: false
