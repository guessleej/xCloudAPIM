name: Docker Publish

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      services:
        description: "要 build 的服務（逗號分隔，空白 = 全部）"
        required:    false
        default:     ""
      platforms:
        description: "Target platforms"
        required:    false
        default:     "linux/amd64,linux/arm64"

concurrency:
  group:  docker-publish-${{ github.ref }}
  cancel-in-progress: false  # never cancel image pushes mid-flight

permissions:
  contents:      read
  packages:      write
  id-token:      write
  attestations:  write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/xcloudapim

# ═══════════════════════════════════════════════════════════════
jobs:

  # ─────────────────────────────────────────────────────────────
  # Detect which services changed (on main push)
  # On tag push → always build all
  # ─────────────────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04
    outputs:
      gateway:      ${{ steps.filter.outputs.gateway }}
      bff:          ${{ steps.filter.outputs.bff }}
      studio:       ${{ steps.filter.outputs.studio }}
      portal:       ${{ steps.filter.outputs.portal }}
      analytics:    ${{ steps.filter.outputs.analytics }}
      notification: ${{ steps.filter.outputs.notification }}
      auth:         ${{ steps.filter.outputs.auth }}
      registry:     ${{ steps.filter.outputs.registry }}
      subscription: ${{ steps.filter.outputs.subscription }}
      policy:       ${{ steps.filter.outputs.policy }}
      is-tag:       ${{ steps.ctx.outputs.is-tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Detect tag push
        id: ctx
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "is-tag=true" >> $GITHUB_OUTPUT
          else
            echo "is-tag=false" >> $GITHUB_OUTPUT
          fi

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            gateway:
              - 'gateway/**'
            bff:
              - 'manager/bff/**'
            studio:
              - 'studio/**'
            portal:
              - 'portal/**'
            analytics:
              - 'manager/services/analytics/**'
            notification:
              - 'manager/services/notification/**'
            auth:
              - 'manager/services/auth/**'
            registry:
              - 'manager/services/registry/**'
            subscription:
              - 'manager/services/subscription/**'
            policy:
              - 'policy-engine/**'

  # ─────────────────────────────────────────────────────────────
  # Node.js Services
  # ─────────────────────────────────────────────────────────────
  build-gateway:
    name: Build / gateway
    needs: changes
    if: ${{ needs.changes.outputs.gateway == 'true' || needs.changes.outputs.is-tag == 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/reusable-docker.yml
    with:
      service:   gateway
      context:   gateway
      platforms: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
      push:      true
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-bff:
    name: Build / bff
    needs: changes
    if: ${{ needs.changes.outputs.bff == 'true' || needs.changes.outputs.is-tag == 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/reusable-docker.yml
    with:
      service:   bff
      context:   manager/bff
      platforms: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
      push:      true
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-studio:
    name: Build / studio
    needs: changes
    if: ${{ needs.changes.outputs.studio == 'true' || needs.changes.outputs.is-tag == 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/reusable-docker.yml
    with:
      service:   studio
      context:   studio
      platforms: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
      push:      true
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-portal:
    name: Build / portal
    needs: changes
    if: ${{ needs.changes.outputs.portal == 'true' || needs.changes.outputs.is-tag == 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/reusable-docker.yml
    with:
      service:   portal
      context:   portal
      platforms: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
      push:      true
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-analytics:
    name: Build / analytics-service
    needs: changes
    if: ${{ needs.changes.outputs.analytics == 'true' || needs.changes.outputs.is-tag == 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/reusable-docker.yml
    with:
      service:   analytics-service
      context:   manager/services/analytics
      platforms: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
      push:      true
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-notification:
    name: Build / notification-service
    needs: changes
    if: ${{ needs.changes.outputs.notification == 'true' || needs.changes.outputs.is-tag == 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/reusable-docker.yml
    with:
      service:   notification-service
      context:   manager/services/notification
      platforms: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
      push:      true
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # Go Services
  # ─────────────────────────────────────────────────────────────
  build-auth:
    name: Build / auth-service
    needs: changes
    if: ${{ needs.changes.outputs.auth == 'true' || needs.changes.outputs.is-tag == 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/reusable-docker.yml
    with:
      service:   auth-service
      context:   manager/services/auth
      platforms: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
      push:      true
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-registry:
    name: Build / registry-service
    needs: changes
    if: ${{ needs.changes.outputs.registry == 'true' || needs.changes.outputs.is-tag == 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/reusable-docker.yml
    with:
      service:   registry-service
      context:   manager/services/registry
      platforms: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
      push:      true
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-subscription:
    name: Build / subscription-service
    needs: changes
    if: ${{ needs.changes.outputs.subscription == 'true' || needs.changes.outputs.is-tag == 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/reusable-docker.yml
    with:
      service:   subscription-service
      context:   manager/services/subscription
      platforms: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
      push:      true
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-policy:
    name: Build / policy-engine
    needs: changes
    if: ${{ needs.changes.outputs.policy == 'true' || needs.changes.outputs.is-tag == 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/reusable-docker.yml
    with:
      service:   policy-engine
      context:   policy-engine
      platforms: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
      push:      true
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # Post-push summary
  # ─────────────────────────────────────────────────────────────
  publish-summary:
    name: Publish Summary
    runs-on: ubuntu-24.04
    if: always()
    needs:
      - build-gateway
      - build-bff
      - build-studio
      - build-portal
      - build-analytics
      - build-notification
      - build-auth
      - build-registry
      - build-subscription
      - build-policy
    steps:
      - name: Write job summary
        run: |
          echo "## 🐳 Docker Publish Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status | Digest |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|--------|" >> $GITHUB_STEP_SUMMARY

          declare -A results=(
            ["gateway"]="${{ needs.build-gateway.result }}"
            ["bff"]="${{ needs.build-bff.result }}"
            ["studio"]="${{ needs.build-studio.result }}"
            ["portal"]="${{ needs.build-portal.result }}"
            ["analytics-service"]="${{ needs.build-analytics.result }}"
            ["notification-service"]="${{ needs.build-notification.result }}"
            ["auth-service"]="${{ needs.build-auth.result }}"
            ["registry-service"]="${{ needs.build-registry.result }}"
            ["subscription-service"]="${{ needs.build-subscription.result }}"
            ["policy-engine"]="${{ needs.build-policy.result }}"
          )

          declare -A digests=(
            ["gateway"]="${{ needs.build-gateway.outputs.image-digest }}"
            ["bff"]="${{ needs.build-bff.outputs.image-digest }}"
            ["studio"]="${{ needs.build-studio.outputs.image-digest }}"
            ["portal"]="${{ needs.build-portal.outputs.image-digest }}"
            ["analytics-service"]="${{ needs.build-analytics.outputs.image-digest }}"
            ["notification-service"]="${{ needs.build-notification.outputs.image-digest }}"
            ["auth-service"]="${{ needs.build-auth.outputs.image-digest }}"
            ["registry-service"]="${{ needs.build-registry.outputs.image-digest }}"
            ["subscription-service"]="${{ needs.build-subscription.outputs.image-digest }}"
            ["policy-engine"]="${{ needs.build-policy.outputs.image-digest }}"
          )

          for svc in gateway bff studio portal analytics-service notification-service auth-service registry-service subscription-service policy-engine; do
            result="${results[$svc]}"
            digest="${digests[$svc]}"
            icon="⏭️"
            [ "$result" = "success" ] && icon="✅"
            [ "$result" = "failure" ] && icon="❌"
            [ "$result" = "cancelled" ] && icon="🚫"
            echo "| \`$svc\` | $icon $result | \`${digest:0:20}...\` |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`ghcr.io/${{ github.repository_owner }}/xcloudapim-*\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Ref:** \`${{ github.ref }}\`" >> $GITHUB_STEP_SUMMARY
