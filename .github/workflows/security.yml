name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  schedule:
    # 每天 UTC 02:00 掃描
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents:      read
  security-events: write
  pull-requests:  write

# ═══════════════════════════════════════════════════════════════
jobs:

  # ─────────────────────────────────────────────────────────────
  # Dependency Review（PR 時比對新增依賴的 CVE）
  # ─────────────────────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses:    GPL-3.0, LGPL-3.0

  # ─────────────────────────────────────────────────────────────
  # Go vulnerability check (govulncheck)
  # ─────────────────────────────────────────────────────────────
  govulncheck:
    name: Go Vuln Check
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            dir:     manager/services/auth
          - service: registry-service
            dir:     manager/services/registry
          - service: subscription-service
            dir:     manager/services/subscription
          - service: policy-engine
            dir:     policy-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: ${{ matrix.dir }}/go.sum
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
        env:
          GOTOOLCHAIN: auto
      - name: Run govulncheck
        working-directory: ${{ matrix.dir }}
        run: govulncheck ./...
        env:
          GOTOOLCHAIN: auto

  # ─────────────────────────────────────────────────────────────
  # npm audit — Node.js services
  # ─────────────────────────────────────────────────────────────
  npm-audit:
    name: npm audit
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            dir:     gateway
          - service: bff
            dir:     manager/bff
          - service: studio
            dir:     studio
          - service: portal
            dir:     portal
          - service: analytics
            dir:     manager/services/analytics
          - service: notification
            dir:     manager/services/notification
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json
      - run: npm ci --prefix ${{ matrix.dir }} --prefer-offline
      - name: npm audit
        working-directory: ${{ matrix.dir }}
        # audit-level=critical: high-severity framework CVEs (e.g. Next.js 14→16 upgrade)
        # are accepted until a planned major-version migration
        run: npm audit --audit-level=critical --omit=dev

  # ─────────────────────────────────────────────────────────────
  # Trivy container image scan（推送後掃描）
  # ─────────────────────────────────────────────────────────────
  trivy-scan:
    name: Trivy Image Scan
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - bff
          - auth-service
          - registry-service
          - subscription-service
          - policy-engine
          - portal
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        continue-on-error: true   # skip gracefully if image not yet pushed via CD
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:    "ghcr.io/${{ github.repository_owner }}/xcloudapim-${{ matrix.service }}:latest"
          format:       "sarif"
          output:       "trivy-${{ matrix.service }}.sarif"
          severity:     "CRITICAL,HIGH"
          exit-code:    "0"  # don't fail — upload to Security tab instead
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy scan results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: hashFiles(format('trivy-{0}.sarif', matrix.service)) != ''
        with:
          sarif_file: "trivy-${{ matrix.service }}.sarif"
          category:   "trivy-${{ matrix.service }}"

  # ─────────────────────────────────────────────────────────────
  # CodeQL static analysis（JavaScript / TypeScript）
  # ─────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-24.04
    if: github.event_name != 'schedule' || github.ref == 'refs/heads/main'
    permissions:
      security-events: write
      actions:         read
      contents:        read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript, go]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries:   security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
