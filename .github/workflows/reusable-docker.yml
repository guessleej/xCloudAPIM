name: Reusable — Docker Build & Push

on:
  workflow_call:
    inputs:
      service:
        required: true
        type:     string
        description: "服務名稱，對應 image name（e.g. gateway）"
      context:
        required: true
        type:     string
        description: "Docker build context（相對 repo root）"
      dockerfile:
        required: false
        type:     string
        default:  Dockerfile
      platforms:
        required: false
        type:     string
        default:  "linux/amd64,linux/arm64"
      push:
        required: false
        type:     boolean
        default:  true
      image-tag-suffix:
        required: false
        type:     string
        default:  ""
    secrets:
      GHCR_TOKEN:
        required: true
    outputs:
      image-digest:
        description: "推送後的 image digest"
        value: ${{ jobs.docker.outputs.digest }}
      image-ref:
        description: "完整 image ref（含 digest）"
        value: ${{ jobs.docker.outputs.image-ref }}

jobs:
  docker:
    name: ${{ inputs.service }}
    runs-on: ubuntu-24.04
    permissions:
      contents:  read
      packages:  write
      id-token:  write  # cosign OIDC keyless signing

    outputs:
      digest:    ${{ steps.build.outputs.digest }}
      image-ref: ${{ steps.build.outputs.imageid }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU (cross-platform builds)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:v0.14.0

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Generate Docker metadata
        id:   meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/xcloudapim-${{ inputs.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=xCloudAPIM ${{ inputs.service }}
            org.opencontainers.image.vendor=xCloudAPIM
            maintainer=xcloudapim

      - name: Build and push
        id:   build
        uses: docker/build-push-action@v7
        with:
          context:    ${{ inputs.context }}
          file:       ${{ inputs.context }}/${{ inputs.dockerfile }}
          platforms:  ${{ inputs.platforms }}
          push:       ${{ inputs.push }}
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=${{ inputs.service }}
          cache-to:   type=gha,scope=${{ inputs.service }},mode=max
          provenance: true
          sbom:       true

      - name: Install cosign
        if:   ${{ inputs.push && github.event_name != 'pull_request' }}
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign (keyless OIDC)
        if:   ${{ inputs.push && github.event_name != 'pull_request' }}
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository_owner }}/xcloudapim-${{ inputs.service }}@${{ steps.build.outputs.digest }}

      - name: Output image info
        run: |
          echo "### 📦 ${{ inputs.service }}" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags | $(echo '${{ steps.meta.outputs.tags }}' | tr '\n' ' ') |" >> $GITHUB_STEP_SUMMARY
