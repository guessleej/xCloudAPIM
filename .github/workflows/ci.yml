name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # docker-compose 設定驗證
  # ─────────────────────────────────────────────────────────────
  compose-validate:
    name: docker-compose validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose files
        env:
          # 佔位環境變數驗證語法（不啟動服務）
          POSTGRES_PASSWORD: ci
          REDIS_PASSWORD: ci
          SESSION_SECRET: ci_session_secret_min_32_chars_xx
          INTERNAL_SERVICE_SECRET: ci
          MGMT_ADMIN_PASSWORD: ci
          VAULT_TOKEN: ci
          MONGO_PASSWORD: ci
          ELASTIC_PASSWORD: ci
          GF_SECURITY_ADMIN_PASSWORD: ci
          KIBANA_PASSWORD: ci
          KIBANA_ENCRYPTION_KEY: ci_kibana_key_min_32_chars_xxxxxxx
          PGADMIN_DEFAULT_EMAIL: ci@example.com
          PGADMIN_DEFAULT_PASSWORD: ci
          JWT_SECRET: ci_jwt_secret_min_32_chars_xxxxxxxx
          KAFKA_SASL_PASSWORD: ci
          KAFKA_SSL_PASSWORD: ci
          INFLUXDB_K6_PASSWORD: ci
          INFLUXDB_K6_ADMIN_TOKEN: ci_influx_token
        run: |
          docker compose -f docker-compose.yml config -q
          echo "✅ docker-compose.yml is valid"

  # ─────────────────────────────────────────────────────────────
  # Go 服務：build + vet + test
  # ─────────────────────────────────────────────────────────────
  go-services:
    name: Go / ${{ matrix.service }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            dir: manager/services/auth
          - service: registry-service
            dir: manager/services/registry
          - service: subscription-service
            dir: manager/services/subscription
          - service: policy-engine
            dir: policy-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
          cache: true
          cache-dependency-path: ${{ matrix.dir }}/go.sum
      - name: go vet
        working-directory: ${{ matrix.dir }}
        run: go vet ./...
      - name: gofmt check
        working-directory: ${{ matrix.dir }}
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "❌ gofmt 未格式化："; echo "$unformatted"; exit 1
          fi
      - name: go build
        working-directory: ${{ matrix.dir }}
        run: go build ./...
      - name: go test
        working-directory: ${{ matrix.dir }}
        run: go test -race -count=1 ./...

  # ─────────────────────────────────────────────────────────────
  # Node 服務：install + lint + test + build
  # ─────────────────────────────────────────────────────────────
  node-services:
    name: Node / ${{ matrix.service }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            dir: gateway
          - service: bff
            dir: manager/bff
          - service: studio
            dir: studio
          - service: portal
            dir: portal
          - service: analytics
            dir: manager/services/analytics
          - service: notification
            dir: manager/services/notification
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json
      - name: Install
        run: npm ci --prefix ${{ matrix.dir }}
      - name: Typecheck
        working-directory: ${{ matrix.dir }}
        run: npm run typecheck --if-present
      - name: Lint
        working-directory: ${{ matrix.dir }}
        run: npm run lint --if-present
      - name: Test
        working-directory: ${{ matrix.dir }}
        run: |
          # 直接以 find 找測試檔餵給 node --test（繞過 package.json 內 Node 20 不展開的 glob）
          files=$(find tests test -name '*.test.mjs' -o -name '*.test.cjs' 2>/dev/null || true)
          if [ -n "$files" ]; then
            echo "▶ 執行測試：$files"
            node --test $files
          else
            echo "ℹ️  無測試檔，略過"
          fi
      - name: Build
        working-directory: ${{ matrix.dir }}
        run: npm run build --if-present
